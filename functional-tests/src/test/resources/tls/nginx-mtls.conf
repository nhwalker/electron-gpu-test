# nginx server config for the mutual-TLS functional test. Serves a single page
# over HTTPS and REQUIRES a client certificate signed by the test CA, so a
# successful page load proves both custom-CA server trust and mTLS on the
# Electron side. Mounted at /etc/nginx/conf.d/default.conf; the certs are copied
# to /etc/nginx/certs/ by the test.
server {
    listen 443 ssl;
    server_name web;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Require and verify a client cert chained to the test CA (mutual TLS).
    ssl_client_certificate /etc/nginx/certs/test-ca.crt;
    ssl_verify_client on;

    location / {
        root  /usr/share/nginx/html;
        index index.html;
    }
}
