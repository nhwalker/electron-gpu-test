<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>webgl worldwind check</title>
    <style>
        html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        /* Fill the BrowserWindow so the screenshot captures the whole globe. */
        #globe { width: 100vw; height: 100vh; display: block; }
        #banner {
            position: fixed; top: 8px; left: 8px; z-index: 10;
            color: #fff; font: 14px/1.4 monospace; white-space: pre;
        }
    </style>
</head>
<body>
    <canvas id="globe">Your browser does not support HTML5 Canvas.</canvas>
    <div id="banner">initializing WorldWind…</div>

    <!-- NASA WebWorldWind, vendored next to this page so it loads with no network. -->
    <script src="worldwind.min.js"></script>
    <script>
        // Status object the functional test polls via executeScript. `done` flips
        // true once initialization settles (success OR failure) so the test never
        // hangs; `ready` only flips true after WorldWind paints its first frame.
        window.WW_TEST = {
            done: false,
            ready: false,
            webgl: false,
            glVersion: null,
            glVendor: null,
            glRenderer: null,
            layers: 0,
            error: null
        };

        function finish() { window.WW_TEST.done = true; }

        function reportError(e) {
            var msg = (e && e.stack) ? e.stack : String(e);
            window.WW_TEST.error = msg;
            var b = document.getElementById('banner');
            if (b) { b.textContent = 'ERROR: ' + msg; }
        }
        // Catch anything thrown asynchronously inside WorldWind too.
        window.addEventListener('error', function (ev) {
            reportError(ev.error || ev.message);
            finish();
        });
        // Safety net: never leave the test waiting if a frame never schedules.
        setTimeout(finish, 8000);

        try {
            // WorldWind resolves its bundled imagery (the Blue Marble base layer)
            // relative to baseUrl; point it at this page's own directory so the
            // vendored images/ folder is used -- no tile servers, no CDN.
            WorldWind.configuration.baseUrl = location.href.replace(/[^/]*$/, '');

            var canvas = document.getElementById('globe');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Constructing the WorldWindow creates the WebGL context; if WebGL is
            // unavailable this throws and we fall into catch below.
            var wwd = new WorldWind.WorldWindow('globe');

            // Offline base imagery shipped with the WorldWind distribution.
            wwd.addLayer(new WorldWind.BMNGOneImageLayer());

            // A bright, purely-geometric overlay (no external image) so the frame
            // is unambiguously non-blank even if the bundled imagery ever fails to
            // load -- it still proves WebGL drew something.
            var overlay = new WorldWind.RenderableLayer('overlay');
            var attrs = new WorldWind.ShapeAttributes(null);
            attrs.interiorColor = new WorldWind.Color(1, 0.35, 0, 0.85);
            attrs.outlineColor = WorldWind.Color.YELLOW;
            attrs.outlineWidth = 4;
            overlay.addRenderable(
                new WorldWind.SurfaceCircle(new WorldWind.Location(0, 0), 4.0e6, attrs));
            wwd.addLayer(overlay);

            // Center on the marker so the globe fills the frame deterministically.
            wwd.navigator.lookAtLocation = new WorldWind.Location(0, 0);
            wwd.navigator.range = 1.6e7;

            // Read WebGL identity straight from the canvas context (the very same
            // context WorldWind created -- getContext returns the existing one).
            var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            window.WW_TEST.webgl = !!gl;
            if (gl) {
                window.WW_TEST.glVersion = gl.getParameter(gl.VERSION);
                window.WW_TEST.glVendor = gl.getParameter(gl.VENDOR);
                var renderer = gl.getParameter(gl.RENDERER);
                var dbg = gl.getExtension('WEBGL_debug_renderer_info');
                if (dbg) {
                    renderer = gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) || renderer;
                }
                window.WW_TEST.glRenderer = renderer;
            }
            window.WW_TEST.layers = wwd.layers.length;

            wwd.redraw();
            // The redraw is serviced on the next animation frame; once that frame
            // has run, a globe has actually been painted.
            requestAnimationFrame(function () {
                window.WW_TEST.ready = true;
                document.getElementById('banner').textContent =
                    'WebGL: ' + window.WW_TEST.glRenderer +
                    '\nlayers: ' + window.WW_TEST.layers;
                finish();
            });
        } catch (e) {
            reportError(e);
            finish();
        }
    </script>
</body>
</html>
