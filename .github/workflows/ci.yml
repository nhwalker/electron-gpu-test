name: CI

# Validate the Electron app source on every PR, and build the container image.
# On pushes to main (and version tags) the image is also published to GHCR.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate-app:
    name: Validate Electron app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install app dependencies
        working-directory: app
        # We only syntax-check here, so skip the (large) Electron binary download.
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: npm install --omit=optional

      - name: Syntax-check main.js
        run: node --check app/main.js

      - name: Syntax-check launch.sh
        run: bash -n app/launch.sh

      - name: Validate package.json
        run: node -e "JSON.parse(require('fs').readFileSync('app/package.json','utf8'))"

  functional-tests:
    name: Functional tests
    needs: validate-app
    runs-on: ubuntu-latest
    # The suite builds the production image and pulls browser images via
    # Testcontainers (Docker is preinstalled and running on GitHub runners).
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Gradle runs on this JDK and uses it for the project's Java 25 toolchain.
      # (If detection ever misses it, the build's Foojay resolver downloads 25.)
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      # Validates the Gradle wrapper checksum and caches Gradle + dependencies.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run functional tests
        working-directory: functional-tests
        run: ./gradlew test

      # Raw Allure results, for feeding into an Allure report later.
      - name: Upload Allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: functional-tests/build/allure-results/
          if-no-files-found: ignore

      # Human-readable JUnit HTML report (handy on failures).
      - name: Upload test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: functional-test-report
          path: functional-tests/build/reports/tests/test/
          if-no-files-found: ignore

  build-image:
    name: Build container image
    needs: validate-app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate when we intend to push (branch/tag pushes, not PRs).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          # Build on PRs to verify it compiles; only push on branch/tag pushes.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
